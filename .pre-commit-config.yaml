repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
        types_or: [c, c++]
      - id: trailing-whitespace
        types_or: [c, c++]

  - repo: local
    hooks:
      - id: clang-format
        name: clang-format
        language: system
        entry: clang-format
        args: [-i]
        types_or: [c, c++]

      - id: clang-tidy
        name: clang-tidy (src/core + src/hal)
        language: system
        # pre-commit appends matched files AFTER all args, placing them after
        # '--', so clang-tidy sees no source files and exits with USAGE.
        # Fix: disable filename passing and find files explicitly so they land
        # BEFORE '--' in the clang-tidy invocation.
        entry: bash -c 'mapfile -t srcs < <(find src/core src/hal -name "*.cpp" 2>/dev/null);
          [ ${#srcs[@]} -eq 0 ] && exit 0;
          clang-tidy --config-file=.clang-tidy "${srcs[@]}" --
          -std=c++17 -fno-exceptions -fno-rtti -I src -I include -DNATIVE_BUILD
          -D_CRT_SECURE_NO_WARNINGS'
        pass_filenames: false
        always_run: true

      - id: no-hardcoded-secrets
        name: No hardcoded secrets
        language: pygrep
        entry: 'define\s+(WIFI_SSID|WIFI_PASSWORD|SMTP_PASS|SMTP_USER|SMTP_HOST|RECIPIENT_EMAIL)\s+"[^"]{2,}"'
        types_or: [c, c++]
        exclude: ^include/secrets\.h\.example$
