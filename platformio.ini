; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
lib_ldf_mode = deep+

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
	-fno-exceptions
	-fno-rtti
	-fstack-protector-strong
	-Os
	-Wall
	-Wextra
	-DESP32
	-D LV_CONF_INCLUDE_SIMPLE
	-I include
	-I src
	"-I${platformio.packages_dir}/framework-arduinoespressif32/libraries/LittleFS/src"
	"-I${platformio.packages_dir}/framework-arduinoespressif32/libraries/WiFi/src"
build_src_filter =
	+<*>
	-<hal/*_fake.cpp>
; Exact-pinned versions: unpinned/ranged entries make the Library Manager hit
; the registry on every build (slow). Bump versions here deliberately.
lib_deps =
	etlcpp/Embedded Template Library@20.47.1
	mobizt/ESP Mail Client@3.4.24
	h2zero/NimBLE-Arduino@2.5.0
	paulstoffregen/OneWire@2.3.8
	lvgl/lvgl@9.5.0
	lovyan03/LovyanGFX@1.2.25
board_build.partitions = partitions_ota.csv  ; dual-partition OTA: app0+app1 2MB each, rollback support

[env:native]
platform = native
test_framework = doctest
extra_scripts = scripts/use_clang.py
build_flags =
	-std=c++17
	-Wall
	-Wextra
	-fno-exceptions
	-fno-rtti
	-DNATIVE_BUILD
	-I src
	-I include
	-I test/test_phase1_link
build_src_filter =
	-<*>
	+<core/**>
	+<hal/*_fake.cpp>
test_build_src = yes
build_type = debug
