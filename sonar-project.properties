# SonarCloud project configuration.
# Set sonar.projectKey and sonar.organization to the values from sonarcloud.io
# after linking this repository (Administration > Project settings).
sonar.projectKey=CHANGE_ME
sonar.organization=CHANGE_ME

sonar.sources=src
sonar.tests=test
sonar.language=c++

# Hardware fakes run on host only; exclude them from embedded analysis.
sonar.exclusions=**/hal/*_fake.cpp

# LLVM coverage report produced by the native-tests CI job.
sonar.cfamily.llvm-cov.reportPath=coverage.txt
